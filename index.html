<!DOCTYPE html>
<html>
<head>
  <title>ReBatch - Reconnect. Relive. Rebuild.</title>
  <meta charset="UTF-8" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #F5F0E6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }

    h2 {
      color: #6A4E42;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      background: #A97155;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #8B5E3C;
    }

    .switch {
      margin-top: 15px;
      cursor: pointer;
      color: #6A4E42;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>ReBatch</h2>

  <input type="text" id="name" placeholder="Full Name" />
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>

  <div class="switch">
    Reconnect. Relive. Rebuild.
  </div>
</div>

<script type="module">

  //const firebaseConfig = {
  apiKey: "AIzaSyCHeoDXdZ9-pq28rcnhEZcLQ0VsXbXN7UM",
  authDomain: "rebatch-fd252.firebaseapp.com",
  projectId: "rebatch-fd252",
  storageBucket: "rebatch-fd252.firebasestorage.app",
  messagingSenderId: "501246832021",
  appId: "1:501246832021:web:9b11d174a1ee59ea2eda9c"
};

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.signup = async function() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      await setDoc(doc(db, "users", user.uid), {
        name: name,
        email: email,
        createdAt: new Date()
      });

      alert("Signup successful 🎉");
    } catch (error) {
      alert(error.message);
    }
  }

  window.login = async function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      alert("Login successful 🚀");
    } catch (error) {
      alert(error.message);
    }
  }

</script>

</body>
</html>
